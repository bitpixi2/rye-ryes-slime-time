<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f0ff" />
    <meta name="description" content="Rye-Rye’s Slime Time is a tiny, tactile slime maker for curious fingers." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Rye-Rye’s Slime Time — Make it. Mix it. Squish it.</title>
  </head>
  <body>
    <main class="app-shell" id="app">
      <header class="topbar">
        <button class="wordmark" id="homeButton" aria-label="Rye-Rye’s Slime Time — go back to the start">
          <span class="wordmark-name">RYE-RYE’S</span><span class="wordmark-tag">SLIME TIME</span>
        </button>
        <div class="top-actions">
          <button class="icon-button" id="resetButton" aria-label="Reset slime" title="Reset slime">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.8 9A8 8 0 1 1 4 15.4M4.8 9V4.8M4.8 9H9"/></svg>
          </button>
          <button class="icon-button" id="soundButton" aria-label="Turn sound off" aria-pressed="true" title="Sound on">
            <svg class="sound-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 10v4h3l4 3V7l-4 3H5Z"/><path d="M15 9.5a4 4 0 0 1 0 5M17.5 7a7.5 7.5 0 0 1 0 10"/></svg>
            <svg class="sound-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 10v4h3l4 3V7l-4 3H5Z"/><path d="m16 10 4 4M20 10l-4 4"/></svg>
          </button>
        </div>
      </header>

      <section class="playground" id="playground" aria-label="Slime playground">
        <div class="fluid-stage" id="fluidStage">
          <canvas id="slimeCanvas" aria-label="A screen-filling slime surface. Drag, swirl, and fold it to play."></canvas>
          <canvas id="toppingCanvas" aria-hidden="true"></canvas>
          <div class="surface-grain" aria-hidden="true"></div>
          <div class="slime-glaze" aria-hidden="true"></div>
        </div>
        <div class="hint-bubble" id="hintBubble" role="status">Pick your slime!</div>

        <section class="welcome-card" id="welcomeCard" aria-labelledby="welcomeTitle">
          <h1 id="welcomeTitle">Rye-Rye’s Slime Time</h1>
          <button class="primary-button" id="startButton">MAKE SLIME <span aria-hidden="true">→</span></button>
          <p class="sound-note">Best with your sound on <span aria-hidden="true">♪</span></p>
        </section>

        <button class="exit-play" id="exitPlayButton">← ADD MORE</button>
        <div class="play-callout" id="playCallout" aria-hidden="true">
          <span>SWIRL</span><span>FOLD</span><span>MIX</span>
        </div>
      </section>

      <section class="maker-panel" id="makerPanel" aria-label="Slime maker steps">
        <nav class="step-tabs" aria-label="Slime making steps">
          <button class="step-tab active" data-step="base" aria-selected="true"><b>1</b><span>SLIME</span></button>
          <button class="step-tab" data-step="mix" aria-selected="false"><b>2</b><span>MIX-INS</span></button>
          <button class="step-tab" data-step="squish" aria-selected="false"><b>3</b><span>SQUISH!</span></button>
        </nav>

        <div class="step-content active" data-panel="base">
          <div class="choice-heading"><strong>Choose your slime</strong><span>Tap a color</span></div>
          <div class="choice-row" role="group" aria-label="Slime colors">
            <button class="slime-choice selected" data-slime="berry" aria-label="Berry bounce slime" aria-pressed="true"><i class="berry"></i><span>Berry<br />Bounce</span></button>
            <button class="slime-choice" data-slime="lime" aria-label="Lime fizz slime" aria-pressed="false"><i class="lime"></i><span>Lime<br />Fizz</span></button>
            <button class="slime-choice" data-slime="mango" aria-label="Mango pop slime" aria-pressed="false"><i class="mango"></i><span>Mango<br />Pop</span></button>
            <button class="slime-choice" data-slime="aqua" aria-label="Aqua wobble slime" aria-pressed="false"><i class="aqua"></i><span>Aqua<br />Wobble</span></button>
            <button class="slime-choice" data-slime="galaxy" aria-label="Galaxy grape slime" aria-pressed="false"><i class="galaxy"></i><span>Galaxy<br />Grape</span></button>
          </div>
        </div>

        <div class="step-content" data-panel="mix">
          <div class="choice-heading"><strong>Toss in the fun</strong><span>Add as many as you like</span></div>
          <div class="choice-row mix-row" role="group" aria-label="Slime mix-ins">
            <button class="mix-choice" data-mix="sprinkles" aria-pressed="false"><i class="sprinkle-preview"></i><span>Candy<br />Sprinkles</span></button>
            <button class="mix-choice" data-mix="stars" aria-pressed="false"><i class="star-preview">★</i><span>Jelly<br />Stars</span></button>
            <button class="mix-choice" data-mix="beads" aria-pressed="false"><i class="bead-preview"></i><span>Bubble<br />Beads</span></button>
            <button class="mix-choice" data-mix="glitter" aria-pressed="false"><i class="glitter-preview">✦</i><span>Cosmic<br />Glitter</span></button>
          </div>
        </div>

        <div class="step-content squish-panel" data-panel="squish">
          <div>
            <p class="ready-kicker">YOUR SLIME IS READY</p>
            <strong>Swirl every color!</strong>
            <span>Drag slowly. Draw loops. Fold the colors together.</span>
          </div>
          <button class="primary-button squish-button" id="squishButton">FILL THE SCREEN <span aria-hidden="true">↗</span></button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
