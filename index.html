<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f0ff" />
    <meta name="description" content="Rye-Rye’s Slime Time is a tiny, tactile slime maker for curious fingers." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Rye-Rye’s Slime Time — Make it. Mix it. Squish it.</title>
  </head>
  <body>
    <main class="app-shell" id="app">
      <header class="topbar">
        <button class="wordmark" id="homeButton" aria-label="Rye-Rye’s Slime Time — go back to the start">
          <img
            class="wordmark-logo"
            src="/brand/rye-ryes-slime-time-logo.png"
            alt=""
            width="48"
            height="48"
            decoding="async"
          />
          <span class="wordmark-title" aria-hidden="true">Rye Rye’s Slime Time</span>
        </button>
        <div class="top-actions">
          <button class="icon-button" id="resetButton" aria-label="Reset slime" title="Reset slime">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.8 9A8 8 0 1 1 4 15.4M4.8 9V4.8M4.8 9H9"/></svg>
          </button>
          <button class="icon-button" id="soundButton" aria-label="Turn sound off" aria-pressed="true" title="Sound on">
            <svg class="sound-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 10v4h3l4 3V7l-4 3H5Z"/><path d="M15 9.5a4 4 0 0 1 0 5M17.5 7a7.5 7.5 0 0 1 0 10"/></svg>
            <svg class="sound-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 10v4h3l4 3V7l-4 3H5Z"/><path d="m16 10 4 4M20 10l-4 4"/></svg>
          </button>
        </div>
      </header>

      <button class="splash-gate" id="splashGate" aria-label="Start Rye-Rye’s Slime Time">
        <span class="splash-logo-orbit" aria-hidden="true">
          <img
            class="splash-logo"
            src="/brand/rye-ryes-slime-time-logo.png"
            alt=""
            width="640"
            height="640"
            fetchpriority="high"
          />
        </span>
      </button>

      <section class="playground" id="playground" aria-label="Slime playground">
        <div class="fluid-stage" id="fluidStage">
          <canvas id="slimeCanvas" aria-label="A screen-filling slime surface. Drag, swirl, and fold it to play."></canvas>
          <canvas id="toppingCanvas" aria-hidden="true"></canvas>
          <div class="surface-grain" aria-hidden="true"></div>
          <div class="slime-glaze" aria-hidden="true"></div>
        </div>
        <div class="hint-bubble" id="hintBubble" role="status">Pick your slime!</div>

        <button class="exit-play" id="exitPlayButton">← ADD MORE</button>
      </section>

      <section class="maker-panel" id="makerPanel" aria-label="Slime maker steps">
        <nav class="step-navigation" aria-label="Move through slime making steps">
          <button class="step-arrow step-back" id="previousStepButton" aria-label="Previous step" disabled>
            <span class="arrow-glyph" aria-hidden="true">←</span><span>BACK</span>
          </button>
          <div class="step-status" aria-live="polite">
            <span id="stepCount">STEP 1 OF 4</span>
            <strong id="stepName">CHOOSE A TYPE</strong>
          </div>
          <button class="step-arrow step-next" id="nextStepButton" aria-label="Next step: choose slime color">
            <span id="nextStepLabel">COLORS</span><span class="arrow-glyph" aria-hidden="true">→</span>
          </button>
        </nav>

        <div class="step-content active" data-panel="type">
          <div class="choice-heading"><strong>Pick how it feels</strong></div>
          <div class="type-choice-row" role="group" aria-label="Slime physics type">
            <button class="type-choice" data-slime-type="liquidy" aria-label="Glowy slime type" aria-pressed="false"><img src="/type-previews/glowy.jpg" alt="" /><span>Glowy</span></button>
            <button class="type-choice" data-slime-type="cloud3d" aria-label="Blobby slime type" aria-pressed="false"><img src="/type-previews/blobby.jpg" alt="" /><span>Blobby</span></button>
            <button class="type-choice" data-slime-type="bingsu" aria-label="Puffy-Pop slime type" aria-pressed="false"><img src="/type-previews/squishy.jpg" alt="" /><span>Puffy-Pop</span></button>
            <button class="type-choice" data-slime-type="putty" aria-label="Stretchy slime type" aria-pressed="false"><img src="/type-previews/stretchy.jpg" alt="" /><span>Stretchy</span></button>
          </div>
        </div>

        <div class="step-content" data-panel="base">
          <div class="choice-heading"><strong>Choose your colors</strong><span>Tap a palette</span></div>
          <div class="choice-row" role="group" aria-label="Slime colors">
            <button class="slime-choice selected" data-slime="berry" aria-label="Berry slime" aria-pressed="true"><i class="berry"></i><span>Berry</span></button>
            <button class="slime-choice" data-slime="lime" aria-label="Lime slime" aria-pressed="false"><i class="lime"></i><span>Lime</span></button>
            <button class="slime-choice" data-slime="mango" aria-label="Mango slime" aria-pressed="false"><i class="mango"></i><span>Mango</span></button>
            <button class="slime-choice" data-slime="aqua" aria-label="Aqua slime" aria-pressed="false"><i class="aqua"></i><span>Aqua</span></button>
          </div>
        </div>

        <div class="step-content" data-panel="mix">
          <div class="choice-heading"><strong>Toss in the fun</strong><span>Tap each up to 5 times</span></div>
          <div class="choice-row mix-row" role="group" aria-label="Slime toppings">
            <button class="mix-choice" data-mix="sprinkles" aria-label="Sprinkles, 0 of 5 batches added"><b class="mix-count" aria-hidden="true">0/5</b><canvas class="mix-preview" data-preview="sprinkles" width="180" height="120" aria-hidden="true"></canvas><span>Sprinkles</span></button>
            <button class="mix-choice" data-mix="animals" aria-label="Animals, 0 of 5 batches added"><b class="mix-count" aria-hidden="true">0/5</b><canvas class="mix-preview" data-preview="animals" width="180" height="120" aria-hidden="true"></canvas><span>Animals</span></button>
            <button class="mix-choice" data-mix="beads" aria-label="Beads, 0 of 5 batches added"><b class="mix-count" aria-hidden="true">0/5</b><canvas class="mix-preview" data-preview="beads" width="180" height="120" aria-hidden="true"></canvas><span>Beads</span></button>
            <button class="mix-choice" data-mix="glitter" aria-label="Stars, 0 of 5 batches added"><b class="mix-count" aria-hidden="true">0/5</b><canvas class="mix-preview" data-preview="glitter" width="180" height="120" aria-hidden="true"></canvas><span>Stars</span></button>
          </div>
        </div>

      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
